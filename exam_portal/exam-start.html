<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Starting Soon | SEB Exam Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-bg">

  <!-- Portal Header -->
  <header class="portal-header">
    <div class="header-inner">
      <div class="brand">
        <img src="logo.png" alt="SSC Logo" class="brand-logo">
        <div class="brand-text">
          <h1>Government of India</h1>
          <p>Computer Based Test (CBT) Examination Portal</p>
        </div>
      </div>
      <div class="header-divider d-none d-md-block"></div>
      <!-- Live time remaining chip -->
      <div style="display:flex;align-items:center;gap:8px;background:rgba(239,68,68,0.15);border:1.5px solid rgba(239,68,68,0.35);border-radius:var(--radius-full);padding:7px 16px;">
        <i class="fas fa-clock" style="color:#f87171;font-size:0.9rem;"></i>
        <span style="font-size:0.85rem;font-weight:700;color:#fca5a5;" id="headerTimer">--:--:--</span>
      </div>
    </div>
  </header>

  <!-- Page -->
  <div class="page-wrapper">
    <div class="card-glass animate-in" style="width:100%;max-width:520px;">
      <div class="p-5 text-center">

        <!-- Status icon -->
        <div class="pulse-anim mb-4" style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--emerald-600),var(--emerald-400));display:flex;align-items:center;justify-content:center;margin:0 auto;">
          <i class="fas fa-hourglass-half" style="font-size:2rem;color:white;"></i>
        </div>

        <h2 class="section-heading mb-1">Exam Will Start Soon</h2>
        <p class="section-sub mb-1">SSC  Free Test</p>

        <!-- Scheduled time -->
        <div class="info-badge justify-content-center mb-4 mt-3" style="max-width:280px;margin:0 auto;">
          <i class="fas fa-calendar-clock"></i>
          Scheduled at <strong style="margin-left:4px;">9:00 AM</strong>
        </div>

        <!-- Countdown Units -->
        <div class="d-flex justify-content-center gap-3 mb-4" id="countdownRow">
          <div class="countdown-unit tick-anim">
            <span class="countdown-val" id="cd-hours">00</span>
            <span class="countdown-lbl">Hours</span>
          </div>
          <div style="display:flex;align-items:center;font-size:2rem;font-weight:800;color:var(--navy-600);margin-bottom:20px;">:</div>
          <div class="countdown-unit tick-anim" style="animation-delay:0.33s">
            <span class="countdown-val" id="cd-mins">00</span>
            <span class="countdown-lbl">Minutes</span>
          </div>
          <div style="display:flex;align-items:center;font-size:2rem;font-weight:800;color:var(--navy-600);margin-bottom:20px;">:</div>
          <div class="countdown-unit tick-anim" style="animation-delay:0.66s">
            <span class="countdown-val" id="cd-secs">00</span>
            <span class="countdown-lbl">Seconds</span>
          </div>
        </div>

        <p style="font-size:0.88rem;color:var(--gray-500);margin-bottom:28px;">Please remain seated and wait for the exam to begin.</p>

        <!-- Start Now Button -->
        <button class="btn-primary-portal" id="startNowBtn" onclick="startExamNow()" style="max-width:260px;margin:0 auto;">
          <i class="fas fa-play-circle me-2"></i> Start Exam Now
        </button>

      
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="examstart.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEB Exam Portal – Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-bg">

  <!-- Portal Header -->
  <header class="portal-header">
    <div class="header-inner">
      <div class="brand">
        <img src="logo.png" alt="SSC Logo" class="brand-logo">
        <div class="brand-text">
          <h1>Government of India</h1>
          <p>Computer Based Test (CBT) Examination Portal</p>
        </div>
       
      </div>
      <div class="header-divider d-none d-md-block"></div>
      <div class="candidate-chip d-none d-md-flex">
        <img src="student.jpg" alt="Candidate" class="candidate-avatar">
        <div class="candidate-meta">
          <span class="candidate-name">Thanuja</span>
          <span class="candidate-reg">Reg: 12345</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Login Page Wrapper -->
  <div class="page-wrapper">
    <div class="card-glass animate-in" style="width:100%;max-width:380px;">
      <div class="p-3 p-md-4">

        <!-- Seat Badge -->
        <div class="info-badge mb-4 d-flex justify-content-center">
          Seat Number: <strong>45</strong>
        </div>

        <!-- Heading -->
        <div class="mb-4 text-center">
          <h2 class="section-heading"> Login</h2>
          <p class="section-sub">Enter your credentials to begin the examination</p>
        </div>

        














        .
        

        <!-- Form -->
        <form id="loginForm" novalidate>
          <div class="form-field">
            <label for="userId">User ID</label>
            <div class="input-wrap">
              <input class="form-ctrl" type="text" id="userId" placeholder="Enter your User ID" value="MCA2026" required>
              <i class="fas fa-user"></i>
            </div>
          </div>

          <div class="form-field">
            <label for="password">Password</label>
            <div class="input-wrap" id="pwdWrap">
              <input class="form-ctrl" type="password" id="password" placeholder="Enter your password" required>
              <i class="fas fa-lock"></i>
              <button type="button" id="togglePwd" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray-400);font-size:0.9rem;z-index:3;" title="Show/hide password">
                <i class="fas fa-eye" id="pwdIcon"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-primary-portal mt-2" id="loginBtn">
            Sign In 
          </button>
        </form>

        
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="login.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candidate Details | SEB Exam Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-bg">

  <!-- Portal Header -->
  <header class="portal-header">
    <div class="header-inner">
      <div class="brand">
        <img src="logo.png" alt="SSC Logo" class="brand-logo">
        <div class="brand-text">
          <h1>Government of India</h1>
          <p>Computer Based Test (CBT) Examination Portal</p>
        </div>
       
      </div>
      <div class="header-divider d-none d-md-block"></div>
      <div class="candidate-chip d-none d-md-flex">
        <img src="student.jpg" alt="Candidate" class="candidate-avatar">
        <div class="candidate-meta">
          <span class="candidate-name">Thanuja</span>
          <span class="candidate-reg">Reg: 12345</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Page -->
  <div class="page-wrapper">
    <div class="card-glass animate-in" style="width:100%;max-width:640px;">

      <!-- Card Top -->
      <div class="p-4 border-bottom" style="border-color:var(--gray-100)!important;">
        <div class="text-center">
          <h2 class="section-heading" style="font-size:1.25rem;">Candidate Details</h2>
          <p class="section-sub" style="margin-top:0;">Verify your information before proceeding</p>
        </div>
      </div>

      <!-- Details -->
      <div id="detailsContainer">
        <div class="detail-row">
          <span class="detail-label"><i class="fas fa-user me-2"></i>Name</span>
          <span class="detail-value">Thanuja</span>
        </div>
        <div class="detail-row">
          <span class="detail-label"><i class="fas fa-hashtag me-2"></i>Roll Number</span>
          <span class="detail-value">123456</span>
        </div>
        <div class="detail-row">
          <span class="detail-label"><i class="fas fa-building me-2"></i>Center Name</span>
          <span class="detail-value">CHANDANA RESOURCE CENTER</span>
        </div>
        <div class="detail-row">
          <span class="detail-label"><i class="fas fa-code me-2"></i>Center Code</span>
          <span class="detail-value">100</span>
        </div>
        <div class="detail-row">
          <span class="detail-label"><i class="fas fa-book me-2"></i>Subject</span>
          <span class="detail-value">ENGLISH</span>
        </div>
        <div class="detail-row">
          <span class="detail-label"><i class="fas fa-tag me-2"></i>Subject Code</span>
          <span class="detail-value">ENG123HZ</span>
        </div>
        <div class="detail-row">
          <span class="detail-label"><i class="fas fa-language me-2"></i>Medium</span>
          <div class="detail-value">
            <select class="form-select" id="mediumSelect" style="max-width:200px;" onchange="handleMediumChange(this.value)">
              <option value="ENGLISH">ENGLISH</option>
              <option value="HINDI">HINDI</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Action -->
      <div class="p-4">
        <a href="instuction.html" class="btn-primary-portal">
          <i class="fas fa-check-circle me-2"></i> Confirm & Proceed 
        </a>
       
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="profile.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Result | SEB Exam Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-bg">

  <!-- Portal Header -->
  <header class="portal-header">
    <div class="header-inner">
      <div class="brand">
        <img src="logo.png" alt="SSC Logo" class="brand-logo">
        <div class="brand-text">
          <h1>Staff Selection Commission (Government of India)</h1>
          <p>SSC  Free Test – Result</p>
        </div>
      </div>
    </div>
  </header>

  <!-- Page -->
  <div class="page-wrapper" style="align-items:flex-start;padding-top:32px;">


    <div class="card-glass animate-in" style="width:100%;max-width:580px;">




      <!-- Header Strip -->
      <div class="p-2 border-bottom text-center" style="border-color:var(--gray-100)!important;">

        <h2 class="section-heading">Test Result</h2>
      </div>

      <!-- Hero Score -->
      <div class="result-hero" style="padding-top:12px;">
        <div class="pass-pill pass"><i class="fas fa-check-circle me-1"></i> PASS</div>

        <div class="score-donut" id="scoreDonut" style="width:120px;height:120px;margin:0 auto;">

          <div class="score-donut-inner">
            <span class="score-pct" id="scorePct">75%</span>
            <span class="score-lbl">Score</span>
          </div>
        </div>
        <p style="margin-top:8px;font-size:0.8rem;color:var(--gray-400);font-weight:500;">

          Marks Obtained: <strong style="color:var(--navy-700)">30.00</strong> / 40.00
        </p>
      </div>

      <!-- Stats Row -->
      <div class="stats-row" style="padding:12px !important;gap:8px !important;">


        <div class="stat-tile correct">
          <span class="stat-num">30</span>
          <span class="stat-name">✓ Correct</span>
        </div>
        <div class="stat-tile wrong">
          <span class="stat-num">10</span>
          <span class="stat-name">✗ Wrong</span>
        </div>
        <div class="stat-tile unanswered">
          <span class="stat-num">0</span>
          <span class="stat-name">○ Skipped</span>
        </div>
      </div>

      <!-- Actions -->
      <div class="p-3 pt-0 d-flex flex-column flex-sm-row gap-2">
        <button class="btn-primary-portal px-4 py-2" onclick="window.location.href='test-summary.html'" style="flex:1;">
          <i class="fas fa-table me-2"></i> View Test Summary
        </button>
        <button class="btn-primary-portal px-4 py-2" onclick="window.location.href='rating.html'" style="flex:1;">
          <i class="fas fa-star me-2"></i> Next
        </button>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="result.js"></script>
</body>
</html>

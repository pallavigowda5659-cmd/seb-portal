<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration | SEB Exam Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-bg">

  <!-- Portal Header -->
  <header class="portal-header">
    <div class="header-inner">
      <div class="brand">
        <img src="logo.png" alt="SSC Logo" class="brand-logo">
        <div class="brand-text">
          <h1>Staff Selection Commission (Government of India)</h1>
          <p>New Candidate Registration Portal</p>
        </div>
        <span class="header-badge">CBT 2026</span>
      </div>
    </div>
  </header>

  <!-- Page -->
  <div class="page-wrapper" style="align-items:flex-start;padding-top:32px;">
    <div class="card-glass animate-in" style="width:100%;max-width:560px;">

      <!-- Card Header -->
      <div class="p-4 border-bottom" style="border-color:var(--gray-100)!important;">
        <div class="d-flex align-items-center gap-3">
          <div style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,var(--purple-600),var(--purple-500));display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <i class="fas fa-user-plus" style="color:white;font-size:1.3rem;"></i>
          </div>
          <div>
            <h2 class="section-heading text-start" style="font-size:1.2rem;">Student Registration</h2>
            <p class="section-sub text-start" style="margin-top:0;">Create your exam portal account</p>
          </div>
        </div>
      </div>

      <div class="p-4">
        <form id="signupForm" novalidate>

          <!-- Full Name -->
          <div class="form-field">
            <label for="fullName">Full Name</label>
            <div class="input-wrap">
              <input class="form-ctrl" type="text" id="fullName" placeholder="Enter your full name" required>
              <i class="fas fa-user"></i>
            </div>
          </div>

          <!-- Phone -->
          <div class="form-field">
            <label>Phone Number</label>
            <div style="display:flex;gap:0;">
              <div class="input-wrap" style="flex:1;">
                <input class="form-ctrl" type="tel" id="phoneInput" placeholder="10-digit mobile number" maxlength="10"
                  style="border-radius:var(--radius-md) 0 0 var(--radius-md);border-right:none;">
                <i class="fas fa-phone"></i>
              </div>
              <button type="button" class="btn-send-otp" id="sendPhoneBtn" onclick="sendPhoneOTP()">
                <i class="bi bi-send-fill me-1"></i> Send OTP
              </button>
            </div>
            <div id="phoneVerifiedBadge" class="verified-badge" style="display:none;">
              <i class="fas fa-check-circle"></i> Phone Verified
            </div>

            <!-- Phone OTP Panel -->
            <div class="otp-panel" id="phoneOtpPanel">
              <div class="otp-info">OTP sent to <strong id="phoneDisplay"></strong></div>
              <div class="otp-field-group" id="phoneOtpFields">
                <input type="text" class="otp-cell" maxlength="1">
                <input type="text" class="otp-cell" maxlength="1">
                <input type="text" class="otp-cell" maxlength="1">
                <input type="text" class="otp-cell" maxlength="1">
                <input type="text" class="otp-cell" maxlength="1">
                <input type="text" class="otp-cell" maxlength="1">
              </div>
              <button type="button" class="btn-primary-portal" onclick="verifyPhoneOTP()" style="font-size:0.88rem;padding:10px 16px;">
                <i class="fas fa-check me-2"></i> Verify OTP
              </button>
              <p style="font-size:0.75rem;color:var(--gray-400);text-align:center;margin-top:10px;">
                Resend in <span id="phoneTimer">60</span>s &nbsp;|&nbsp;
                <a href="#" onclick="sendPhoneOTP();return false;" style="color:var(--navy-600);font-weight:600;">Resend OTP</a>
              </p>
            </div>
          </div>

          <!-- Email -->
          <div class="form-field">
            <label>Email Address</label>
            <div style="display:flex;gap:0;">
              <div class="input-wrap" style="flex:1;">
                <input class="form-ctrl" type="email" id="emailInput" placeholder="Enter your email address"
                  style="border-radius:var(--radius-md) 0 0 var(--radius-md);border-right:none;">
                <i class="fas fa-envelope"></i>
              </div>
              <button type="button" class="btn-send-otp" id="sendEmailBtn" onclick="sendEmailOTP()">
                <i class="bi bi-send-fill me-1"></i> Send OTP
              </button>
            </div>
            <div id="emailVerifiedBadge" class="verified-badge" style="display:none;">
              <i class="fas fa-check-circle"></i> Email Verified
            </div>

            <!-- Email OTP Panel -->
            <div class="otp-panel" id="emailOtpPanel">
              <div class="otp-info">OTP sent to <strong id="emailDisplay"></strong></div>
              <div class="otp-field-group" id="emailOtpFields">
                <input type="text" class="otp-cell" maxlength="1">
                <input type="text" class="otp-cell" maxlength="1">
                <input type="text" class="otp-cell" maxlength="1">
                <input type="text" class="otp-cell" maxlength="1">
                <input type="text" class="otp-cell" maxlength="1">
                <input type="text" class="otp-cell" maxlength="1">
              </div>
              <button type="button" class="btn-primary-portal" onclick="verifyEmailOTP()" style="font-size:0.88rem;padding:10px 16px;">
                <i class="fas fa-check me-2"></i> Verify OTP
              </button>
              <p style="font-size:0.75rem;color:var(--gray-400);text-align:center;margin-top:10px;">
                Resend in <span id="emailTimer">60</span>s &nbsp;|&nbsp;
                <a href="#" onclick="sendEmailOTP();return false;" style="color:var(--navy-600);font-weight:600;">Resend OTP</a>
              </p>
            </div>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn-primary-portal mt-2" id="submitBtn">
            <i class="fas fa-user-check me-2"></i> Register Now
          </button>

          <p class="text-center mt-3" style="font-size:0.82rem;color:var(--gray-400);">
            Already registered? <a href="index.html" style="color:var(--navy-600);font-weight:600;">Sign In</a>
          </p>

        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="registration.js"></script>
</body>
</html>

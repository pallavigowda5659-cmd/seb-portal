<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Summary | SEB Exam Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-bg">

  <!-- Portal Header -->
  <header class="portal-header">
    <div class="header-inner">
      <div class="brand">
        <img src="logo.png" alt="SSC Logo" class="brand-logo">
        <div class="brand-text">
          <h1>Staff Selection Commission (Government of India)</h1>
          <p>SSC Free Test – Test Summary</p>
        </div>
      </div>
    </div>
  </header>

  <!-- Page -->
  <div class="page-wrapper" style="align-items:center;padding:24px 16px;">
    <div class="card-glass animate-in" style="width:100%;max-width:580px;">

      <!-- Header -->
      <div class="p-3 border-bottom text-center" style="border-color:var(--gray-100)!important;">
        <div class="d-flex align-items-center justify-content-center gap-2 mb-2">
          <i class="fas fa-list-alt" style="color:var(--navy-600);font-size:1.4rem;"></i>
          <h2 class="section-heading mb-0" style="font-size:1.3rem;">Test Summary</h2>
        </div>
        <p class="section-sub mb-0" style="font-size:0.82rem;">Detailed test performance breakdown</p>
      </div>

      <!-- Summary Content -->
      <div class="p-4">


        
        <div class="summary-table">
          <div class="summary-row-item">
            <span class="summary-key">Total Questions</span>
            <span class="summary-val">40</span>
          </div>
          <div class="summary-row-item">
            <span class="summary-key">Questions Attempted</span>
            <span class="summary-val">40</span>
          </div>
          <div class="summary-row-item">
            <span class="summary-key">Correct Answers</span>
            <span class="summary-val" style="color:var(--emerald-600)">30</span>
          </div>
          <div class="summary-row-item">
            <span class="summary-key">Wrong Answers</span>
            <span class="summary-val" style="color:var(--red-500)">10</span>
          </div>
          <div class="summary-row-item">
            <span class="summary-key">Marks Obtained</span>
            <span class="summary-val">30.00</span>
          </div>
          <div class="summary-row-item">
            <span class="summary-key">Total Marks</span>
            <span class="summary-val">40.00</span>
          </div>
          <div class="summary-row-item">
            <span class="summary-key">Percentage</span>
            <span class="summary-val" style="color:var(--navy-600)">75.00%</span>
          </div>
          <div class="summary-row-item">
            <span class="summary-key">Negative Marks Deducted</span>
            <span class="summary-val" style="color:var(--red-500)">–2.50</span>
          </div>
        </div>

        <!-- Actions -->
<div class="d-flex gap-1 mt-3">
          <button class="btn-primary-portal px-3 py-1.5 btn-sm flex-fill" onclick="window.location.href='result.html'">
            <i class="fas fa-arrow-left me-1"></i> Result
          </button>
          <button class="btn-navy px-3 py-1.5 btn-sm flex-fill" onclick="downloadResult()">
            <i class="fas fa-download me-1"></i> Download
          </button>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
